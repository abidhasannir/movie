<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieBox Admin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { padding: 40px; }
        .hidden { display: none !important; }
        
        /* Dashboard Styles */
        #dashboard {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #dashboard.visible {
            opacity: 1;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-actions { display: flex; gap: 15px; }
        .maintenance-toggle {
            background: #ff2a5f;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 42, 95, 0.4);
            transition: all 0.3s ease;
        }
        .maintenance-toggle.active {
            background: #4caf50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.2); }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th { background: rgba(0,0,0,0.4); font-weight: 600; color: var(--text-muted); }
        .device-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        /* Login Overlay Styles */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,5,8,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .login-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .login-card h2 { margin-bottom: 30px; font-size: 2rem; }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        .login-card input:focus { border-color: var(--primary); }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .login-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .error-msg {
            color: #ff2a5f;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginOverlay">
        <div class="login-card" id="loginCard">
            <h2><div class="logo">Movie<span>Box</span></div></h2>
            <div id="loginError" class="error-msg"><i class="fas fa-exclamation-circle"></i> Invalid Username or Password</div>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required autocomplete="username">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="login-btn">Sign In to Dashboard</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="admin-header">
            <div class="logo">Admin<span>Panel</span></div>
            <div class="header-actions">
                <button id="maintenanceBtn" class="maintenance-toggle">Turn ON Maintenance</button>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <h2>Live Analytics (Last 100 Visitors)</h2>
        <table>
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>Country</th>
                    <th>Device</th>
                    <th>Last Seen</th>
                </tr>
            </thead>
            <tbody id="visitorsTable">
                <tr><td colspan="4" style="text-align:center;">Loading analytics...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = 'http://localhost:8000'; // Change to your actual backend domain when live
        let refreshInterval = null;

        function getAuthHeader() {
            const token = sessionStorage.getItem('adminToken');
            return token ? { 'Authorization': `Basic ${token}` } : {};
        }

        async function fetchAnalytics() {
            try {
                const res = await fetch(`${API_URL}/api/admin/analytics`, {
                    headers: getAuthHeader()
                });
                
                if(res.status === 401) {
                    logout();
                    return;
                }
                
                const data = await res.json();
                
                // Update button
                const btn = document.getElementById('maintenanceBtn');
                if (data.maintenance) {
                    btn.classList.add('active');
                    btn.textContent = 'Turn OFF Maintenance';
                } else {
                    btn.classList.remove('active');
                    btn.textContent = 'Turn ON Maintenance';
                }

                // Update table
                const tbody = document.getElementById('visitorsTable');
                tbody.innerHTML = '';
                if(data.visitors.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No visitors yet</td></tr>';
                    return;
                }
                
                data.visitors.forEach(v => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-family:monospace; color:var(--primary);">${v.ip}</td>
                        <td>${v.country}</td>
                        <td><span class="device-badge">${v.device}</span></td>
                        <td style="color:var(--text-muted);">${v.last_seen}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function login(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const token = btoa(`${user}:${pass}`);
            
            try {
                // Test the credentials
                const res = await fetch(`${API_URL}/api/admin/analytics`, {
                    headers: { 'Authorization': `Basic ${token}` }
                });
                
                if (res.ok) {
                    sessionStorage.setItem('adminToken', token);
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('dashboard').classList.add('visible');
                    fetchAnalytics();
                    refreshInterval = setInterval(fetchAnalytics, 10000);
                } else {
                    showLoginError();
                }
            } catch (err) {
                showLoginError();
            }
        }
        
        function showLoginError() {
            const err = document.getElementById('loginError');
            const card = document.getElementById('loginCard');
            err.style.display = 'block';
            card.classList.remove('shake');
            void card.offsetWidth; // trigger reflow
            card.classList.add('shake');
        }

        function logout() {
            sessionStorage.removeItem('adminToken');
            clearInterval(refreshInterval);
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('visible');
            document.getElementById('loginForm').reset();
            document.getElementById('loginError').style.display = 'none';
        }

        // Event Listeners
        document.getElementById('loginForm').addEventListener('submit', login);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('maintenanceBtn').addEventListener('click', async () => {
            if(!confirm("Are you sure you want to toggle the maintenance mode?")) return;
            try {
                await fetch(`${API_URL}/api/admin/toggle-maintenance`, { 
                    method: 'POST',
                    headers: getAuthHeader()
                });
                fetchAnalytics();
            } catch (err) {
                console.error(err);
            }
        });

        // Check if already logged in
        if (sessionStorage.getItem('adminToken')) {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('dashboard').classList.add('visible');
            fetchAnalytics();
            refreshInterval = setInterval(fetchAnalytics, 10000);
        }
    </script>
</body>
</html>
