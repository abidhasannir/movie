<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MovieBox Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }

        .contact-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .contact-card h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-card p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .contact-method {
            display: flex;
            align-items: center;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            text-decoration: none;
            color: white;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .contact-method:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 42, 95, 0.15);
        }

        .contact-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            margin-right: 1.5rem;
            color: var(--primary);
            transition: var(--transition);
        }

        .contact-method:hover .contact-icon {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .contact-details {
            text-align: left;
        }

        .contact-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .back-btn {
            display: inline-block;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">Movie<span>Box</span></a>
    </nav>

    <div class="contact-container fade-in">
        <div class="contact-card">
            <h1>Get in Touch</h1>
            <p>Have a question, feedback, or DMCA request? Reach out to the MovieBox administration team directly.</p>
            
            <div class="contact-links">
                <!-- Telegram -->
                <a href="https://t.me/protikabir" target="_blank" class="contact-method">
                    <div class="contact-icon">
                        <i class="fab fa-telegram-plane"></i>
                    </div>
                    <div class="contact-details">
                        <span class="contact-label">Telegram</span>
                        <span class="contact-value">@protikabir</span>
                    </div>
                </a>

                <!-- Email -->
                <a href="mailto:cyberabirr@gmail.com" class="contact-method">
                    <div class="contact-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-details">
                        <span class="contact-label">Email Support</span>
                        <span class="contact-value">cyberabirr@gmail.com</span>
                    </div>
                </a>
            </div>

            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Movies</a>
        </div>
    </div>

</body>
</html>
